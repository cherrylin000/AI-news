name: Daily AI Insights

on:
  schedule:
    - cron: '17 6 * * *'
      timezone: Asia/Shanghai
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-insights
  cancel-in-progress: false

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Install dependencies
        working-directory: scripts
        run: npm install --no-audit --no-fund

      - name: Generate insights and publish site
        working-directory: scripts
        env:
          TZ: Asia/Shanghai
          LLM_API_URL: ${{ secrets.LLM_API_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          SITE_URL: https://cherrylin000.github.io/AI-news
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          BUTTONDOWN_MODE: send
        run: node daily-insights.js --send-buttondown

      - name: Commit and push site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 站点产物：根 index.html + docs/（latest、feed、archive）；勿提交已废弃的 site/
          git add docs/ index.html .nojekyll
          git add docs/buttondown-state.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No site changes to commit."
          else
            git commit -m "chore: daily insights $(date -u +%Y-%m-%d)"
            git push
          fi
